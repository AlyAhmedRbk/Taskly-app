<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taskly • Task Manager</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-content">
        <div class="logo">
          <span class="logo-icon">📋</span>
          <h1>Taskly</h1>
        </div>
        <p class="tagline">Stay organized • Get things done</p>
      </div>
    </header>

    <div class="container">
      <!-- Add Task -->
      <div class="add-card">
        <h2 class="card-title">New Task</h2>
        <form id="taskForm" class="task-form">
          <input type="text" id="title" placeholder="What needs to be done?" required>
          <textarea id="description" placeholder="Add more details (optional)"></textarea>
          <div class="form-actions">
            <select id="status" class="status-select">
              <option value="pending">Pending</option>
              <option value="in-progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
            <button type="submit" class="btn-add">Create Task</button>
          </div>
        </form>
      </div>

      <!-- Tasks Section -->
      <div class="tasks-header">
        <h2>Your Tasks</h2>
        <span id="taskCount" class="task-count">0 tasks</span>
      </div>

      <div id="taskList" class="task-list"></div>

      <div id="emptyState" class="empty-state hidden">
        <div class="empty-icon">📪</div>
        <h3>All clear!</h3>
        <p>No tasks yet. Create one above.</p>
      </div>
    </div>
  </div>

  <!-- Status Modal -->
  <div id="statusModal" class="modal">
    <div class="modal-dialog">
      <h3>Update Status</h3>
      <select id="modalStatusSelect" class="modal-select">
        <option value="pending">Pending</option>
        <option value="in-progress">In Progress</option>
        <option value="completed">Completed</option>
      </select>
      <div class="modal-footer">
        <button id="cancelModalBtn" class="btn-cancel">Cancel</button>
        <button id="saveStatusBtn" class="btn-save">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="/js/app.js"></script>
</body>
</html>
